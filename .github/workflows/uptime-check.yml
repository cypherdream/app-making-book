# Free external uptime monitoring using GitHub Actions' scheduler —
# the internal self-check in server.ts can't detect "the whole server
# is asleep or crashed" since it only runs while the process is alive.
# This hits the real public URL from outside, the way a paid uptime
# service would, at zero cost.
name: Uptime check

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend /health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.BACKEND_HEALTH_URL }}" || echo "000")
          echo "Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Backend health check failed with status $STATUS"
            exit 1
          fi
