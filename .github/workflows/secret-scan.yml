# Free secret scanning using gitleaks (open source) — catches
# accidentally committed API keys, tokens, and credentials. Runs on
# every push/PR and the full git history weekly. This complements
# GitHub's own (also free, automatic) push protection for public repos.
name: Secret scanning

on:
  push:
  pull_request:
  schedule:
    - cron: '0 5 * * 1'

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
