openapi: 3.0.3
info:
  title: app-making-book API
  version: "1.0"
  description: |
    Backend API for app-making-book. This spec covers the primary
    endpoints; admin sub-routes not listed here follow the same
    Bearer-auth pattern documented on GET /api/admin/dashboard below —
    see backend/src/routes/adminRoutes.ts for the complete list.
servers:
  - url: http://localhost:3000
    description: Local development
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string, format: email }
        createdAt: { type: string, format: date-time }
    Error:
      type: object
      properties:
        error: { type: string }
paths:
  /health:
    get:
      summary: Server status check
      responses:
        "200":
          description: OK
  /api/auth/register:
    post:
      summary: Create an account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name: { type: string }
                email: { type: string, format: email }
                password: { type: string, minLength: 10 }
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        "409":
          description: Email already registered
  /api/auth/login:
    post:
      summary: Log in — returns tokens, or twoFactorRequired if 2FA is enabled
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        "200":
          description: "Either { accessToken, refreshToken, user } or { twoFactorRequired: true, preAuthToken }"
        "401":
          description: Invalid credentials
        "423":
          description: Account locked (5+ failed attempts)
  /api/auth/2fa/verify-login:
    post:
      summary: Complete login when 2FA is required
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [preAuthToken, code]
              properties:
                preAuthToken: { type: string }
                code: { type: string, description: 6-digit TOTP code }
      responses:
        "200": { description: Tokens issued }
        "401": { description: Invalid code or expired pre-auth token }
  /api/auth/refresh:
    post:
      summary: Exchange a refresh token for a new access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties: { refreshToken: { type: string } }
      responses:
        "200": { description: New access token issued }
        "401": { description: Refresh token invalid, expired, or revoked }
  /api/auth/logout-all:
    post:
      summary: Revoke every access/refresh token on every device
      security: [{ bearerAuth: [] }]
      responses: { "200": { description: OK } }
  /api/auth/sessions:
    get:
      summary: List active device sessions
      security: [{ bearerAuth: [] }]
      responses: { "200": { description: Array of sessions } }
  /api/auth/sessions/{id}:
    delete:
      summary: Revoke a single session (sign out one device)
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses: { "200": { description: OK } }
  /api/auth/2fa/setup:
    post:
      summary: Generate a TOTP secret (does not enable 2FA yet)
      security: [{ bearerAuth: [] }]
      responses: { "200": { description: "{ otpauthUrl, secret }" } }
  /api/auth/2fa/enable:
    post:
      summary: Confirm a TOTP code to actually enable 2FA
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties: { code: { type: string } }
      responses:
        "200": { description: 2FA enabled }
        "401": { description: Invalid code }
  /api/auth/2fa/disable:
    post:
      summary: Turn off 2FA
      security: [{ bearerAuth: [] }]
      responses: { "200": { description: OK } }
  /api/auth/verify-email/request:
    post:
      summary: (Re)send the email verification link
      security: [{ bearerAuth: [] }]
      responses: { "200": { description: Email sent (or already verified) } }
  /api/auth/verify-email/{token}:
    get:
      summary: Confirm email via the link's token
      parameters:
        - { name: token, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Verified }
        "400": { description: Invalid or expired token }
  /api/auth/password-reset/request:
    post:
      summary: Request a password reset email
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties: { email: { type: string } }
      responses:
        "200":
          description: Always returns success, whether or not the email exists (prevents account enumeration)
  /api/auth/password-reset/confirm:
    post:
      summary: Set a new password using a reset token
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [token, newPassword]
              properties:
                token: { type: string }
                newPassword: { type: string, minLength: 10 }
      responses:
        "200": { description: Password reset; all existing sessions revoked }
        "400": { description: Invalid or expired token }
  /api/auth/account:
    delete:
      summary: Delete your account (password required)
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties: { password: { type: string } }
      responses:
        "200": { description: Account and all associated data deleted }
        "401": { description: Incorrect password }
  /api/auth/account/export:
    get:
      summary: Export all personal data (GDPR-style), before deletion
      security: [{ bearerAuth: [] }]
      responses: { "200": { description: JSON export of user, progress, logs, events } }
  /api/progress:
    get:
      summary: Get your synced learning-app state
      security: [{ bearerAuth: [] }]
      responses: { "200": { description: "JSON blob, or {} if never synced" } }
    put:
      summary: Replace your synced learning-app state
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { type: object }
      responses: { "200": { description: Saved } }
  /api/admin/dashboard:
    get:
      summary: Admin summary counts (users, lessons, errors, uptime, rate-limit hits)
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Dashboard JSON }
        "403": { description: Not an admin }
  /api/analytics/events:
    post:
      summary: Log a usage or error event (self-hosted analytics)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [type]
              properties:
                type: { type: string, enum: [lesson_view, lesson_complete, quiz_answer, client_error] }
                lessonId: { type: string }
                metadata: { type: object }
      responses: { "202": { description: Accepted } }
  /api/push/vapid-public-key:
    get:
      summary: Get the public VAPID key for Push subscription
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: "{ publicKey }" }
        "503": { description: Push not configured on this server }
  /api/payments/create-checkout-session:
    post:
      summary: Start a Stripe Checkout session for the premium subscription
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: "{ url }" }
        "503": { description: Payments not configured }
  /api/builder/catalog:
    get:
      summary: List available App Builder modules and templates
      security: [{ bearerAuth: [] }]
      responses: { "200": { description: "{ modules, templates }" } }
  /api/builder/interpret:
    post:
      summary: Natural language -> validated JSON app spec (LLM never outputs code)
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [prompt]
              properties: { prompt: { type: string } }
      responses:
        "200": { description: "{ spec }" }
        "422": { description: The model's output didn't match the required schema }
        "503": { description: GROQ_API_KEY not configured }
  /api/builder/generate:
    post:
      summary: Validated spec -> downloadable zip of real generated code
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [spec]
              properties: { spec: { type: object } }
      responses:
        "200": { description: application/zip file download }
        "400": { description: Spec failed validation }
  /api/builder/presets/{name}:
    get:
      summary: Instant ready-made spec from a preset template (no LLM call)
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: name, in: path, required: true, schema: { type: string, enum: [school, restaurant, crm, ecommerce, inventory] } }
      responses:
        "200": { description: "{ spec }" }
        "404": { description: Unknown preset name }
  /api/builder/regenerate-entity:
    post:
      summary: Regenerate files for ONE entity in an existing spec, not the whole project
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [spec, entityName]
              properties:
                spec: { type: object }
                entityName: { type: string }
                mode: { type: string, enum: [standalone, integrate] }
      responses:
        "200": { description: "{ files }" }
        "422": { description: Entity name not found in the given spec }
  /api/builder/community-templates:
    get:
      summary: Browse public community-shared templates (free sharing, not a paid marketplace)
      security: [{ bearerAuth: [] }]
      responses: { "200": { description: Array of public templates } }
    post:
      summary: Share a spec as a community template
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name, spec]
              properties:
                name: { type: string }
                description: { type: string }
                spec: { type: object }
                isPublic: { type: boolean }
      responses: { "201": { description: Template saved } }
  /api/builder/community-templates/{id}:
    get:
      summary: Get one community template (increments its download count)
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Template with its full spec }
        "404": { description: Not found, or private and not yours }
